<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"> <head>
    <meta charset="UTF-8">
    <title>Vé của tôi | Cinema Plus</title>
    <style>
        .ticket-wrapper {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            border: 1px solid #eee;
            transition: transform 0.2s;
        }
        .ticket-wrapper:hover { transform: translateY(-5px); }

        .ticket-left { width: 25%; background: #000; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; }

        .ticket-right { width: 75%; padding: 25px; position: relative; }

        .movie-title { font-size: 22px; font-weight: 800; color: #e71a0f; text-transform: uppercase; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .info-label { color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .info-value { font-weight: 600; color: #333; }

        .seat-badge { background: #fef2f2; color: #e71a0f; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 13px; margin-right: 5px; border: 1px solid #fee2e2; }

        /* Hiệu ứng răng cưa giả */
        .ticket-right::before {
            content: '';
            position: absolute;
            left: -10px; top: 20px;
            width: 20px; height: 20px;
            background: #f8f9fa; /* Khớp màu nền của Layout */
            border-radius: 50%;
        }
        .ticket-right::after {
            content: '';
            position: absolute;
            left: -10px; bottom: 20px;
            width: 20px; height: 20px;
            background: #f8f9fa;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0"><i class="fas fa-ticket-alt me-2 text-danger"></i>LỊCH SỬ ĐẶT VÉ</h3>
            <a href="/" class="btn btn-sm btn-outline-secondary">Tiếp tục đặt vé</a>
        </div>

        <div th:if="${#lists.isEmpty(bookings)}" class="text-center p-5 bg-white rounded-4 shadow-sm">
            <i class="fas fa-receipt fa-4x text-light mb-3"></i>
            <p class="text-muted fs-5">Bạn chưa có giao dịch nào.</p>
            <a href="/" class="btn btn-danger px-4">Khám phá phim ngay</a>
        </div>

        <div th:each="b : ${bookings}" class="ticket-wrapper">
            <div class="ticket-left">
                <img th:src="@{'/uploads/' + ${b.showtime.movie.image}}" class="movie-poster" alt="Poster">
            </div>

            <div class="ticket-right">
                <div class="d-flex justify-content-between">
                    <h5 class="movie-title mb-0" th:text="${b.showtime.movie.title}">Tên Phim</h5>
                    <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2">Đã thanh toán</span>
                </div>

                <p class="text-muted small mt-1">
                    <i class="far fa-clock me-1"></i> Ngày đặt: <span th:text="${#temporals.format(b.bookingDate, 'HH:mm dd/MM/yyyy')}"></span>
                </p>

                <div class="info-grid">
                    <div>
                        <div class="info-label">Rạp / Phòng</div>
                        <div class="info-value">
                            <span th:text="${b.showtime.cinema.name}"></span> - <span th:text="${b.showtime.room.name}"></span>
                        </div>
                    </div>
                    <div>
                        <div class="info-label">Suất chiếu</div>
                        <div class="info-value" th:text="${#temporals.format(b.showtime.startTime, 'HH:mm, dd/MM/yyyy')}"></div>
                    </div>
                    <div class="col-12">
                        <div class="info-label">Ghế ngồi</div>
                        <div class="mt-1">
                            <span th:each="t : ${b.tickets}" class="seat-badge" th:text="${t.seat.rowName + t.seat.seatNumber}"></span>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-end mt-4">
                    <div>
                        <div class="info-label">Tổng cộng</div>
                        <div class="fs-4 fw-bold text-dark" th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                    </div>
                    <div class="text-muted small">
                        Mã đơn: #<span th:text="${b.id}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
