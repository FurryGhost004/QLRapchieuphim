<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Lịch chiếu phim | Booking Online</title>
    <style>
        .booking-page-wrapper {
            background-color: #fdfcf0;
            padding: 40px 0;
            min-height: 80vh;
        }
        .booking-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border: 1px solid #ddd;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }

        /* Slider ngày */
        .date-slider {
            display: flex;
            overflow-x: auto;
            border-bottom: 3px solid #333;
            margin-bottom: 30px;
            padding-bottom: 10px;
            scrollbar-width: thin;
        }
        .date-item {
            min-width: 90px;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            text-decoration: none !important;
            color: #333;
            border-radius: 8px;
            transition: 0.3s;
            margin-right: 10px;
        }
        .date-item:hover { background-color: #f0f0f0; }
        .date-item.active { background-color: #333; color: #fff; }
        .date-item span { font-size: 12px; display: block; text-transform: uppercase; }
        .date-item strong { font-size: 24px; display: block; margin: 5px 0; }

        /* Rạp và giờ */
        .cinema-item { border-bottom: 1px solid #eee; padding: 25px 0; }
        .cinema-item:last-child { border-bottom: none; }
        .cinema-name { font-size: 19px; font-weight: bold; color: #222; margin-bottom: 20px; display: flex; align-items: center; }
        .cinema-name::before { content: ""; width: 5px; height: 20px; background: #e71a0f; margin-right: 12px; display: inline-block; }

        .time-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .time-slot {
            display: inline-block;
            border: 1px solid #d1d1d1;
            padding: 12px 30px;
            text-decoration: none !important;
            color: #e71a0f;
            font-weight: bold;
            background: #fff;
            border-radius: 6px;
            font-size: 17px;
            transition: all 0.2s ease;
        }
        .time-slot:hover {
            background: #e71a0f;
            color: white !important;
            border-color: #e71a0f;
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(231,26,15,0.25);
        }

        /* Thông báo trống */
        .empty-msg { text-align: center; color: #999; padding: 100px 0; font-style: italic; }

        .movie-title-header {
            text-transform: uppercase;
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 20px;
            margin-bottom: 25px;
            color: #333;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="booking-page-wrapper">
        <div class="booking-container">
            <h1 class="movie-title-header">
                <i class="fas fa-ticket-alt me-2" style="color: #e71a0f;"></i>
                <span th:text="${movie.title}">Tên phim</span>
            </h1>

            <div class="date-slider">
                <a th:each="d : ${dates}"
                   th:href="@{/booking/movie/{id}(id=${movie.id}, date=${d})}"
                   th:classappend="${d == selectedDate} ? 'active' : ''"
                   class="date-item">
                    <span th:text="'Tháng ' + ${#temporals.format(d, 'MM')}">Tháng</span>
                    <strong th:text="${#temporals.format(d, 'dd')}">Ngày</strong>
                    <span th:text="${#temporals.format(d, 'EEEE')}">Thứ</span>
                </a>
            </div>

            <div th:each="entry : ${cinemas}" class="cinema-item">
                <div class="cinema-name">
                    <i class="fas fa-map-marker-alt me-2 text-muted" style="font-size: 0.8em;"></i>
                    <span th:text="${entry.key}">Tên Rạp</span>
                </div>
                <div class="time-grid">
                    <a th:each="st : ${entry.value}"
                       th:href="@{/booking/seats/{id}(id=${st.id})}"
                       class="time-slot shadow-sm">
                        <span th:text="${#temporals.format(st.startTime, 'HH:mm')}">19:00</span>
                    </a>
                </div>
            </div>

            <div th:if="${#maps.isEmpty(cinemas)}" class="empty-msg">
                <img src="https://cdn-icons-png.flaticon.com/512/4076/4076432.png" width="100" style="opacity: 0.2; margin-bottom: 20px;">
                <h4 class="text-muted">Rất tiếc, không tìm thấy suất chiếu nào.</h4>
                <p>Vui lòng chọn một ngày khác trong lịch trên.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
