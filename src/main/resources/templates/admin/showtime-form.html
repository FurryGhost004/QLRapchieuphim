<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>Cấu hình Suất Chiếu | Admin</title>
  <style>
    .admin-card { max-width: 850px; margin: 30px auto 60px; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .section-title { border-left: 5px solid #198754; padding-left: 15px; margin-bottom: 30px; }
    .form-label { font-weight: 600; color: #444; font-size: 0.95rem; }
    .input-group-text { background-color: #f8f9fa; font-weight: bold; }
  </style>
</head>
<body>

<div layout:fragment="content">
  <div class="container">
    <div class="admin-card">
      <div class="section-title">
        <h3 class="fw-bold mb-1"
            th:text="${showtime != null and showtime.id != null} ? 'Cập Nhật Suất Chiếu' : 'Tạo Suất Chiếu Mới'">
        </h3>
        <p class="text-muted small mb-0">Thiết lập thời gian, địa điểm và giá vé cho phim.</p>
      </div>

      <form th:action="@{/admin/showtimes/save}" th:object="${showtime}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row">
          <div class="col-12 mb-4">
            <label class="form-label"><i class="fas fa-film me-2"></i>Chọn Phim:</label>
            <select th:field="*{movie.id}" class="form-select form-select-lg" required>
              <option value="">-- Chọn phim đang chiếu --</option>
              <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}"></option>
            </select>
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label"><i class="fas fa-building me-2"></i>Chọn Rạp:</label>
            <select id="cinema-select" th:field="*{cinema.id}" class="form-select" required>
              <option value="">-- Chọn rạp --</option>
              <option th:each="c : ${cinemas}" th:value="${c.id}" th:text="${c.name} + ' - ' + ${c.address}"></option>
            </select>
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label"><i class="fas fa-door-open me-2"></i>Chọn Phòng Chiếu:</label>
            <select id="room-select" th:field="*{room.id}" class="form-select" required>
              <option value="">-- Vui lòng chọn rạp trước --</option>
            </select>
            <input type="hidden" id="old-room-id" th:value="${showtime?.room?.id}">
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label"><i class="fas fa-calendar-day me-2"></i>Ngày chiếu:</label>
            <input type="date" th:field="*{date}" class="form-control" required>
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label"><i class="fas fa-clock me-2"></i>Giờ bắt đầu:</label>
            <input type="time" th:field="*{startTime}" class="form-control" required>
          </div>

          <div class="col-12 mb-4">
            <label class="form-label"><i class="fas fa-tag me-2"></i>Giá vé niêm yết:</label>
            <div class="input-group">
              <input type="number" th:field="*{price}" class="form-control" placeholder="Ví dụ: 85000" required>
              <span class="input-group-text">VNĐ</span>
            </div>
          </div>
        </div>

        <div class="mt-4 pt-3 border-top">
          <button type="submit" class="btn btn-success px-5 fw-bold shadow-sm">
            <i class="fas fa-save me-2"></i>LƯU SUẤT CHIẾU
          </button>
          <a th:href="@{/admin/showtimes}" class="btn btn-outline-secondary px-4 ms-2">
            Quay lại danh sách
          </a>
        </div>
      </form>
    </div>
  </div>

  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const cinemaSelect = document.getElementById('cinema-select');
        const roomSelect = document.getElementById('room-select');
        const oldRoomId = document.getElementById('old-room-id').value;

        function loadRooms(cinemaId, targetRoomId) {
            if (!cinemaId) {
                roomSelect.innerHTML = '<option value="">-- Vui lòng chọn rạp trước --</option>';
                return;
            }

            roomSelect.innerHTML = '<option value="">-- Đang tải danh sách phòng... --</option>';

            fetch('/admin/api/rooms/' + cinemaId)
                .then(response => {
                    if (!response.ok) throw new Error('API Error');
                    return response.json();
                })
                .then(data => {
                    roomSelect.innerHTML = '<option value="">-- Chọn phòng --</option>';
                    data.forEach(room => {
                        const option = document.createElement('option');
                        option.value = room.id;
                        option.textContent = room.name;

                        // FIX: Kiểm tra so sánh lỏng để khớp ID từ string hidden input
                        if (room.id == targetRoomId) {
                            option.selected = true;
                        }
                        roomSelect.appendChild(option);
                    });
                })
                .catch(err => {
                    console.error(err);
                    roomSelect.innerHTML = '<option value="">-- Lỗi tải dữ liệu --</option>';
                });
        }

        // Lắng nghe sự kiện thay đổi rạp
        cinemaSelect.addEventListener('change', function() {
            loadRooms(this.value, null);
        });

        // FIX: Tự động kích hoạt khi load trang (dành cho Edit)
        if (cinemaSelect.value) {
            loadRooms(cinemaSelect.value, oldRoomId);
        }
    });
  </script>
</div>
</body>
</html>
