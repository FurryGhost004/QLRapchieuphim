<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.id == null ? 'Thêm Phim Mới' : 'Cập Nhật Phim'} + ' | Admin'"></title>
    <style>
        .form-container { max-width: 950px; margin: 30px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .section-title { border-left: 5px solid #e71a0f; padding-left: 15px; margin-bottom: 30px; }
        .preview-img { width: 200px; height: 280px; object-fit: cover; border-radius: 10px; border: 2px dashed #ddd; padding: 5px; margin-top: 10px; }
        .no-image-placeholder { width: 200px; height: 280px; background: #f8f9fa; border: 2px dashed #ccc; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; margin-top: 10px; }
        .form-label { font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container pb-5">
        <div class="form-container">
            <div class="section-title">
                <h3 class="fw-bold text-dark" th:text="${movie.id == null ? 'THÊM PHIM MỚI' : 'CHỈNH SỬA PHIM'}"></h3>
                <p class="text-muted small">Cập nhật thông tin chi tiết cho bộ phim.</p>
            </div>

            <form th:action="@{/admin/movies/save}" th:object="${movie}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}">

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold text-uppercase">Tên bộ phim:</label>
                        <input type="text" th:field="*{title}" class="form-control form-control-lg" placeholder="Ví dụ: Lật Mặt 7" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold text-uppercase">Thể loại:</label>
                        <select th:field="*{genre.id}" class="form-select form-select-lg" required>
                            <option value="">-- Chọn thể loại --</option>
                            <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-uppercase">Đạo diễn:</label>
                        <input type="text" th:field="*{director}" class="form-control" placeholder="Tên đạo diễn...">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-uppercase">Diễn viên:</label>
                        <input type="text" th:field="*{actors}" class="form-control" placeholder="Ví dụ: Lý Hải, Tiết Cương...">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold text-uppercase">Ngôn ngữ:</label>
                        <input type="text" th:field="*{language}" class="form-control" placeholder="Tiếng Việt, Phụ đề tiếng Anh...">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold text-uppercase">Thời lượng (phút):</label>
                        <input type="number" th:field="*{duration}" class="form-control" placeholder="120" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold text-uppercase">Phân loại (Rated):</label>
                        <select th:field="*{rated}" class="form-select">
                            <option value="P">P - Mọi độ tuổi</option>
                            <option value="K">K - Dưới 13 tuổi (có giám hộ)</option>
                            <option value="T13">T13 - Từ đủ 13 tuổi</option>
                            <option value="T16">T16 - Từ đủ 16 tuổi</option>
                            <option value="T18">T18 - Từ đủ 18 tuổi</option>
                            <option value="C">C - Không phổ biến</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold text-uppercase">Ngày khởi chiếu:</label>
                        <input type="date" th:field="*{releaseDate}" class="form-control" required>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label fw-bold text-uppercase">Mô tả phim:</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="col-md-12 mb-4">
                        <label class="form-label fw-bold text-uppercase">Poster phim:</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*" onchange="previewImage(this)">

                        <div class="mt-3">
                            <img id="img-preview"
                                 th:src="${movie.image != null} ? @{'/uploads/' + ${movie.image}} : ''"
                                 th:classappend="${movie.image == null} ? 'd-none' : ''"
                                 class="preview-img shadow-sm">

                            <div id="image-placeholder" th:classappend="${movie.image != null} ? 'd-none' : ''" class="no-image-placeholder">
                                <i class="fas fa-image fa-3x mb-2"></i>
                                <span class="small">Xem trước Poster</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 pt-4 border-top">
                    <button type="submit" class="btn btn-danger px-5 fw-bold">
                        <i class="fas fa-save me-2"></i>LƯU PHIM
                    </button>
                    <a th:href="@{/admin/movies}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>



    <script th:inline="javascript">
        function previewImage(input) {
            const preview = document.getElementById('img-preview');
            const placeholder = document.getElementById('image-placeholder');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('d-none');
                    if (placeholder) placeholder.classList.add('d-none');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</div>
</body>
</html>
